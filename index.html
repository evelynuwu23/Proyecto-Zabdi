<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Zabdi ❤️</title>

  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <audio id="music" loop>
    <source src="assets/music/lofi.mp3" type="audio/mpeg">
  </audio>

  <div class="background"></div>
  <div class="petals"></div>
  <div class="sparkles"></div>

  <button id="musicBtn" class="music-btn">🎵 Música</button>

  <section class="app">
    <div class="card" id="card">
      <div class="text-area">
        <p class="mini-title" id="miniTitle">Ponte tus audífonos 🎧</p>
        <h1 id="title">Antes de comenzar...</h1>
        <p id="message">Esta pequeña sorpresa fue hecha con mucho cariño.</p>

        <div class="buttons" id="buttons">
          <button class="primary-btn" id="nextBtn">Comenzar ✨</button>
        </div>
      </div>

      <div class="character-area">
        <img id="miniEvelyn" src="assets/characters/evelyn-happy.png" alt="Mini Evelyn">
      </div>
    </div>

    <footer class="footer-info">
      <span>🧸Hecho con mucho cariño✨</span>
    </footer>
  </section>

  <script src="script.js"></script>
</body>
</html>
